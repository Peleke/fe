<!DOCTYPE html>
<html>
<head>
<style>
body { margin: 0; background: #000; display: flex; align-items: center; justify-content: center; width: 512px; height: 512px; }
.avatar {
  width: 512px; height: 512px;
  background: radial-gradient(circle at 50% 50%, #12120f 0%, #08080a 70%);
  display: flex; align-items: center; justify-content: center;
  position: relative;
  overflow: hidden;
}
.glow {
  position: absolute;
  width: 300px; height: 300px;
  background: radial-gradient(circle, rgba(110, 231, 183, 0.08) 0%, transparent 70%);
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
}
.rune {
  font-size: 220px;
  color: #6ee7b7;
  text-shadow:
    0 0 40px rgba(110, 231, 183, 0.3),
    0 0 80px rgba(110, 231, 183, 0.1);
  position: relative;
  z-index: 1;
  line-height: 1;
}
</style>
</head>
<body>
<div class="avatar">
  <div class="glow"></div>
  <div class="rune">ᚠ</div>
</div>
</body>
</html>
