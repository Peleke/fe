<!DOCTYPE html>
<html>
<head>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
body { margin: 0; background: #000; display: flex; align-items: center; justify-content: center; width: 1200px; height: 630px; overflow: hidden; }
.thumb {
  width: 1200px; height: 630px; background: #08080a;
  display: flex; align-items: center; justify-content: space-between;
  position: relative; overflow: hidden;
  font-family: 'DM Sans', sans-serif; padding: 0 80px;
}
.grid { position: absolute; inset: 0; background-image: linear-gradient(rgba(255,255,255,0.015) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,0.015) 1px, transparent 1px); background-size: 50px 50px; }
.glow { position: absolute; width: 400px; height: 400px; background: radial-gradient(circle, rgba(91, 184, 176, 0.08) 0%, transparent 65%); top: 50%; right: 15%; transform: translate(0, -50%); }
.left { position: relative; z-index: 1; }
.tag { font-family: 'JetBrains Mono', monospace; font-size: 13px; letter-spacing: 0.12em; text-transform: uppercase; color: #5bb8b0; margin-bottom: 16px; }
.title { font-size: 44px; font-weight: 300; color: #e6e4df; line-height: 1.15; letter-spacing: -0.02em; }
.title strong { font-weight: 500; color: #5bb8b0; }
.sub { font-size: 18px; color: #a09e96; margin-top: 16px; line-height: 1.5; max-width: 520px; }
.right { position: relative; z-index: 1; font-size: 180px; color: #c9a84c; text-shadow: 0 0 60px rgba(201, 168, 76, 0.25), 0 0 120px rgba(201, 168, 76, 0.08); line-height: 1; }
.border-line { position: absolute; bottom: 0; left: 0; right: 0; height: 3px; background: linear-gradient(90deg, transparent, #5bb8b0, transparent); }
</style>
</head>
<body>
<div class="thumb">
  <div class="grid"></div>
  <div class="glow"></div>
  <div class="left">
    <div class="tag">Fe Briefing &middot; Email 2</div>
    <div class="title">5 moving<br><strong>parts.</strong></div>
    <div class="sub">Your money is doing things right now. Fe watches all of it.</div>
  </div>
  <div class="right">&#5765;</div>
  <div class="border-line"></div>
</div>
</body>
</html>
